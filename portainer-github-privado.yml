version: "3.8"

# ═══════════════════════════════════════════════════════════════════════════
# DEPLOY NO PORTAINER — Repositório GitHub PRIVADO
# ═══════════════════════════════════════════════════════════════════════════
#
# PASSO A PASSO:
#
# 1. No Portainer → Stacks → Add stack → Web editor
# 2. Cole este arquivo completo
# 3. Preencha as variáveis de ambiente abaixo (seção Environment variables)
# 4. Clique em "Deploy the stack"
#
# ═══════════════════════════════════════════════════════════════════════════

services:
  revendai:
    image: python:3.11-slim
    working_dir: /app
    command: >
      bash -c "
      apt-get update -qq &&
      apt-get install -y -qq git curl &&
      rm -rf /tmp/repo &&
      git clone https://$${GITHUB_USER}:$${GITHUB_TOKEN}@github.com/AioliaTech/sistemaapi.git /tmp/repo &&
      cp -r /tmp/repo/* /app/ &&
      pip install --no-cache-dir -q -r requirements.txt &&
      exec uvicorn main:app --host 0.0.0.0 --port 3000
      "
    ports:
      - "3000:3000"
    environment:
      # ═══ CREDENCIAIS DO GITHUB (para clonar repo privado) ═══
      - GITHUB_USER=${GITHUB_USER}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      
      # ═══ CREDENCIAIS DO PAINEL ADMIN ═══
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@revendai.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-@Admin123}
      - JWT_SECRET=${JWT_SECRET}
      - BASE_URL=${BASE_URL:-http://localhost:3000}
    volumes:
      - revendai_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

volumes:
  revendai_data:
