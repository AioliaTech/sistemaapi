version: "3.8"

services:
  revendai-panel:
    image: revendai/panel:latest
    ports:
      - "3000:3000"
    environment:
      # These three variables are REQUIRED — no defaults are provided.
      # Set them via Docker secrets or your CI/CD pipeline before deploying.
      # Generate JWT_SECRET with: openssl rand -hex 32
      - ADMIN_EMAIL
      - ADMIN_PASSWORD
      - JWT_SECRET
      - BASE_URL=${BASE_URL:-https://api.revendai.com}
    volumes:
      - revendai_data:/app/data
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: stop-first
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  revendai_data:
    driver: local
