version: "3.8"

# ═══════════════════════════════════════════════════════════════════════════
# STACK FINAL — RevendAI Panel com Traefik (HTTP apenas)
# ═══════════════════════════════════════════════════════════════════════════
#
# INSTRUÇÕES:
# 1. Delete o stack atual no Portainer
# 2. Stacks → Add stack → Web editor
# 3. Cole este arquivo completo
# 4. Deploy
#
# Acesse: http://api.revendai.com
#
# ═══════════════════════════════════════════════════════════════════════════

services:
  revendai:
    image: python:3.11-slim
    working_dir: /app
    # Mantém o container rodando em foreground
    command: >
      bash -c "
      set -e &&
      echo '[SETUP] Instalando dependências...' &&
      apt-get update -qq &&
      apt-get install -y -qq git curl &&
      echo '[SETUP] Clonando repositório...' &&
      rm -rf /tmp/repo &&
      git clone https://$${GITHUB_USER}:$${GITHUB_TOKEN}@github.com/AioliaTech/sistemaapi.git /tmp/repo &&
      cp -r /tmp/repo/* /app/ &&
      echo '[SETUP] Instalando pacotes Python...' &&
      pip install --no-cache-dir -q -r requirements.txt &&
      echo '[SETUP] Iniciando aplicação...' &&
      uvicorn main:app --host 0.0.0.0 --port 3000 --log-level info
      "
    environment:
      # GitHub credentials (set in Portainer environment variables)
      - GITHUB_USER=${GITHUB_USER}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      # Admin panel credentials
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@revendai.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-@Admin123}
      - JWT_SECRET=${JWT_SECRET}
      - BASE_URL=${BASE_URL:-http://api.revendai.com}
    volumes:
      - revendai_data:/app/data
    networks:
      - infra_revendai-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        # Traefik labels
        - "traefik.enable=true"
        - "traefik.http.routers.revendai.rule=Host(`api.revendai.com`)"
        - "traefik.http.routers.revendai.entrypoints=web"
        - "traefik.http.services.revendai.loadbalancer.server.port=3000"
        # Docker Swarm specific
        - "traefik.docker.network=infra_revendai-net"

volumes:
  revendai_data:

networks:
  infra_revendai-net:
    external: true
